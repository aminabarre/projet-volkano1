<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RED PRODUCT – Détails hôtel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style> * { font-family: 'Poppins', sans-serif; } </style>
</head>
<body class="bg-gray-100 min-h-screen flex">

  <div id="overlay" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden" onclick="toggleSidebar()"></div>

  <aside id="sidebar"
    class="w-[220px] min-h-screen shadow-md flex flex-col fixed top-0 left-0 z-40
           -translate-x-full lg:translate-x-0 transition-transform duration-300"
    style="background-image: url('images/baground.jpeg'); background-size: cover;">
    <div class="absolute inset-0 bg-black/60 z-0"></div>
    <div class="relative z-10 flex flex-col flex-1">
      <div class="flex items-center justify-between px-4 py-4 border-b border-white/20">
        <div class="flex items-center gap-2">
          <span class="inline-block w-[16px] h-[20px] bg-white [clip-path:polygon(0%_0%,100%_0%,100%_100%,50%_78%,0%_100%)]"></span>
          <span class="text-white font-semibold text-[0.85rem] tracking-wide">RED PRODUCT</span>
        </div>
        <button onclick="toggleSidebar()" class="lg:hidden text-white/70 hover:text-white">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <div class="px-3 pt-4 flex-1">
        <p class="text-[0.7rem] text-white/60 tracking-widest mb-2 px-2">Principal</p>
        <nav class="flex flex-col gap-1">
          <a href="dashboard.html" class="flex items-center gap-2 px-3 py-2 rounded-lg text-[0.82rem] text-white/80 hover:bg-white/10 transition-colors">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
            </svg>
            Dashboard
          </a>
          <a href="hotels.html" class="flex items-center gap-2 px-3 py-2 rounded-lg text-[0.82rem] text-white/80 hover:bg-white/10 transition-colors">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M3 21h18M3 10h18M3 7l9-4 9 4M4 10v11M20 10v11M8 14v3M12 14v3M16 14v3"/>
            </svg>
            Liste des hôtels
          </a>
        </nav>
      </div>
      <div class="px-3 py-3 border-t border-white/20 flex items-center gap-2">
        <div class="w-7 h-7 rounded-full bg-white/20 flex items-center justify-center text-white text-[0.7rem] font-semibold shrink-0 user-initials">MB</div>
        <div class="min-w-0">
          <p class="text-[0.75rem] font-medium text-white leading-tight truncate user-name">Mouhammet Badiane</p>
          <p class="text-[0.65rem] text-green-400">● En ligne</p>
        </div>
      </div>
    </div>
  </aside>

  <main class="w-full flex flex-col min-h-screen lg:ml-[220px] lg:w-[calc(100%-220px)]">

    <header class="bg-white shadow-sm px-3 md:px-5 py-2.5 flex items-center justify-between sticky top-0 z-10 gap-2">
      <div class="flex items-center gap-2 min-w-0">
        <button onclick="toggleSidebar()" class="lg:hidden text-gray-500 hover:text-gray-700 shrink-0">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <!-- Bouton retour -->
        <button onclick="window.location.href='hotels.html'" class="flex items-center gap-1.5 text-gray-500 hover:text-gray-700">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
          </svg>
          <span class="text-[0.82rem]">Retour</span>
        </button>
        <h1 class="text-[0.88rem] md:text-[0.95rem] font-semibold text-black truncate">Détails de l'hôtel</h1>
      </div>
      <div class="flex items-center gap-2 md:gap-3 shrink-0">
        <div class="relative cursor-pointer">
          <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[0.55rem] w-3.5 h-3.5 rounded-full flex items-center justify-center">3</span>
        </div>
        <div class="w-7 h-7 rounded-full bg-[rgb(86,108,157)] flex items-center justify-center text-white text-[0.7rem] font-semibold cursor-pointer shrink-0 user-initials">MB</div>
        <a href="#" onclick="logout()" class="shrink-0">
          <svg class="w-4 h-4 text-gray-400 hover:text-red-400 transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </a>
      </div>
    </header>

    <!-- CONTENU -->
    <div id="contenu" class="flex-1 p-4 md:p-6">
      <p class="text-gray-400 text-sm text-center py-10">Chargement...</p>
    </div>

  </main>

  <script>
    const API = 'https://red-product-backend-tzk6.onrender.com/api/hotels'
    const token = localStorage.getItem('token')
    const user  = JSON.parse(localStorage.getItem('user'))

    if (!token) window.location.href = 'index.html'

    if (user) {
      const initiales = user.name.substring(0, 2).toUpperCase()
      document.querySelectorAll('.user-initials').forEach(el => el.textContent = initiales)
      document.querySelectorAll('.user-name').forEach(el => el.textContent = user.name)
    }

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('-translate-x-full')
      document.getElementById('overlay').classList.toggle('hidden')
    }

    function logout() {
      localStorage.removeItem('token')
      localStorage.removeItem('user')
      window.location.href = 'index.html'
    }

    // Récupérer l'ID depuis l'URL
    const urlParams = new URLSearchParams(window.location.search)
    const hotelId   = urlParams.get('id')

    if (!hotelId) window.location.href = 'hotels.html'

    async function loadHotel() {
      try {
        const response = await fetch(`${API}/${hotelId}`)
        const hotel    = await response.json()

        if (!response.ok) {
          window.location.href = 'hotels.html'
          return
        }

        document.title = `RED PRODUCT – ${hotel.nom}`

        document.getElementById('contenu').innerHTML = `
          <div class="max-w-3xl mx-auto">

            <!-- Image principale -->
            <div class="w-full h-[250px] md:h-[350px] rounded-2xl overflow-hidden shadow-md mb-6">
              <img src="${hotel.photo || 'images/image1.jpeg'}"
                   alt="${hotel.nom}"
                   class="w-full h-full object-cover"
                   onerror="this.src='images/image1.jpeg'"/>
            </div>

            <!-- Carte infos -->
            <div class="bg-white rounded-2xl shadow-sm p-5 md:p-6">

              <!-- Titre + Prix -->
              <div class="flex items-start justify-between mb-4">
                <div>
                  <h2 class="text-[1.1rem] md:text-[1.3rem] font-semibold text-gray-800">${hotel.nom}</h2>
                  <p class="text-[0.8rem] text-gray-400 mt-1">
                    <svg class="w-3.5 h-3.5 inline mr-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                      <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
                    </svg>
                    ${hotel.adresse}
                  </p>
                </div>
                <div class="text-right">
                  <p class="text-[1rem] font-bold text-[rgb(86,108,157)]">${hotel.prix.toLocaleString()} ${hotel.devise}</p>
                  <p class="text-[0.72rem] text-gray-400">/ nuit</p>
                </div>
              </div>

              <!-- Séparateur -->
              <hr class="border-gray-100 mb-4"/>

              <!-- Infos de contact -->
              <h3 class="text-[0.85rem] font-semibold text-gray-600 mb-3">Informations de contact</h3>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">

                <div class="flex items-center gap-3 bg-gray-50 rounded-xl p-3">
                  <div class="w-8 h-8 rounded-full bg-[rgb(86,108,157)]/10 flex items-center justify-center shrink-0">
                    <svg class="w-4 h-4 text-[rgb(86,108,157)]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                      <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                      <polyline points="22,6 12,13 2,6"/>
                    </svg>
                  </div>
                  <div>
                    <p class="text-[0.68rem] text-gray-400">Email</p>
                    <p class="text-[0.78rem] font-medium text-gray-700">${hotel.email}</p>
                  </div>
                </div>

                <div class="flex items-center gap-3 bg-gray-50 rounded-xl p-3">
                  <div class="w-8 h-8 rounded-full bg-[rgb(86,108,157)]/10 flex items-center justify-center shrink-0">
                    <svg class="w-4 h-4 text-[rgb(86,108,157)]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                      <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13.6 19.79 19.79 0 0 1 1.61 5a2 2 0 0 1 1.99-2H6.6a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 10.1a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
                    </svg>
                  </div>
                  <div>
                    <p class="text-[0.68rem] text-gray-400">Téléphone</p>
                    <p class="text-[0.78rem] font-medium text-gray-700">${hotel.telephone}</p>
                  </div>
                </div>

                <div class="flex items-center gap-3 bg-gray-50 rounded-xl p-3">
                  <div class="w-8 h-8 rounded-full bg-[rgb(86,108,157)]/10 flex items-center justify-center shrink-0">
                    <svg class="w-4 h-4 text-[rgb(86,108,157)]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                  </div>
                  <div>
                    <p class="text-[0.68rem] text-gray-400">Ajouté le</p>
                    <p class="text-[0.78rem] font-medium text-gray-700">${new Date(hotel.createdAt).toLocaleDateString('fr-FR')}</p>
                  </div>
                </div>

                <div class="flex items-center gap-3 bg-gray-50 rounded-xl p-3">
                  <div class="w-8 h-8 rounded-full bg-[rgb(86,108,157)]/10 flex items-center justify-center shrink-0">
                    <svg class="w-4 h-4 text-[rgb(86,108,157)]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                      <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                    </svg>
                  </div>
                  <div>
                    <p class="text-[0.68rem] text-gray-400">Prix par nuit</p>
                    <p class="text-[0.78rem] font-medium text-[rgb(86,108,157)]">${hotel.prix.toLocaleString()} ${hotel.devise}</p>
                  </div>
                </div>

              </div>

              <!-- Boutons action -->
              <div class="flex gap-3 mt-6">
                <button onclick="window.location.href='hotels.html'"
                  class="flex-1 py-2.5 border border-gray-300 text-gray-600 rounded-xl text-[0.82rem] hover:bg-gray-50 transition-colors">
                  ← Retour
                </button>
                <button onclick="window.location.href='hotels.html'"
                  class="flex-1 py-2.5 bg-[rgb(86,108,157)] text-white rounded-xl text-[0.82rem] hover:opacity-90 transition-opacity font-medium">
                  Modifier
                </button>
              </div>

            </div>
          </div>
        `

      } catch (error) {
        console.log('Erreur :', error)
        window.location.href = 'hotels.html'
      }
    }

    loadHotel()
  </script>

</body>
</html>
