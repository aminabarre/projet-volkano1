<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RED PRODUCT – Connexion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body class="font-['Poppins',sans-serif] relative min-h-screen flex flex-col items-center justify-center m-0">

  <!-- Fond -->
  <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('images/baground.jpeg');">
    <div class="absolute inset-0 bg-black/75"></div>
  </div>

  <!-- Contenu -->
  <div class="relative z-10 flex flex-col items-center w-full px-4">

    <!-- Logo -->
    <div class="mb-4 text-center flex items-center justify-center gap-2">
      <img src="images/SVG.png" alt="Logo" class="w-6 h-6 object-contain"/>
      <span class="text-white text-[1rem] font-semibold tracking-[0.05em]">RED PRODUCT</span>
    </div>

    <!-- Carte -->
    <div class="bg-white rounded-lg px-5 py-6 w-full max-w-[340px]">

      <p class="text-center text-black text-[0.8rem] mb-4">
        Connectez-vous en tant que Admin
      </p>

      <!-- Email -->
      <div class="mb-3">
        <input type="email" id="email" placeholder="E-mail"
          class="w-full px-3 py-2 border border-[#ccc] rounded-md text-[0.82rem] text-[#333] outline-none bg-[#f9f9f9] transition-colors duration-200 placeholder:text-[#aaa] focus:border-[rgb(86,108,157)]"/>
      </div>

      <!-- Mot de passe -->
      <div class="mb-3">
        <input type="password" id="password" placeholder="Mot de passe"
          class="w-full px-3 py-2 border border-[#ccc] rounded-md text-[0.82rem] text-[#333] outline-none bg-[#f9f9f9] transition-colors duration-200 placeholder:text-[#aaa] focus:border-[rgb(86,108,157)]"/>
      </div>

      <!-- Gardez-moi connecté -->
      <div class="flex items-center gap-2 mb-3">
        <input type="checkbox" id="remember" class="accent-[rgb(86,108,157)] w-3 h-3 cursor-pointer"/>
        <label for="remember" class="text-[0.78rem] text-black cursor-pointer">Gardez-moi connecté</label>
      </div>

      <!-- Bouton -->
      <button onclick="handleLogin()" id="btnLogin"
        class="w-full py-2 bg-black text-white border-none rounded-md text-[0.82rem] font-medium cursor-pointer transition-opacity duration-200 tracking-[0.03em] hover:opacity-90">
        Se connecter
      </button>

      <!-- Message erreur -->
      <p id="error-msg" class="text-red-500 text-[0.72rem] text-center mt-1.5 hidden"></p>
    </div>

    <!-- Liens -->
    <div class="mt-3 text-center">
      <a href="forgot-password.html" class="text-[#FFD700] text-[0.78rem] no-underline block mb-2">
        Mot de passe oublié?
      </a>
      <p class="text-white text-[0.78rem] m-0">
        Vous n'avez pas de compte?
        <a href="admin-connexion.html" class="text-[#FFD700] font-semibold no-underline">S'inscrire</a>
      </p>
    </div>

  </div>

  <script>
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html'
    }

    async function handleLogin() {
      const email    = document.getElementById('email').value.trim()
      const password = document.getElementById('password').value
      const errorMsg = document.getElementById('error-msg')
      const btn      = document.getElementById('btnLogin')

      errorMsg.classList.add('hidden')
      errorMsg.textContent = ''

      if (!email || !password) {
        errorMsg.textContent = 'Veuillez remplir tous les champs.'
        errorMsg.classList.remove('hidden')
        return
      }

      if (!email.includes('@')) {
        errorMsg.textContent = 'Adresse e-mail invalide.'
        errorMsg.classList.remove('hidden')
        return
      }

      btn.textContent = 'Connexion...'
      btn.disabled = true

      try {
        const response = await fetch('https://red-product-backend-tzk6.onrender.com/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        })

        const data = await response.json()

        if (response.ok) {
          localStorage.setItem('token', data.token)
          localStorage.setItem('user', JSON.stringify(data.user))
          window.location.href = 'dashboard.html'
        } else {
          errorMsg.textContent = data.message || 'Erreur de connexion.'
          errorMsg.classList.remove('hidden')
        }

      } catch (error) {
        errorMsg.textContent = 'Impossible de contacter le serveur.'
        errorMsg.classList.remove('hidden')
      }

      btn.textContent = 'Se connecter'
      btn.disabled = false
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleLogin()
    })
  </script>

</body>
</html>
