<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RED PRODUCT – Inscription</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body class="font-['Poppins',sans-serif] relative min-h-screen flex flex-col items-center justify-center m-0">

  <!-- Fond -->
  <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('images/baground.jpeg');">
    <div class="absolute inset-0 bg-black/75"></div>
  </div>

  <!-- Contenu -->
  <div class="relative z-10 flex flex-col items-center w-full px-4">

    <!-- Logo -->
    <div class="mb-4 text-center flex items-center justify-center gap-2">
      <img src="images/SVG.png" alt="Logo" class="w-6 h-6 object-contain"/>
      <span class="text-white text-[1rem] font-semibold tracking-[0.05em]">RED PRODUCT</span>
    </div>

    <!-- Carte -->
    <div class="bg-white rounded-lg px-5 py-6 w-full max-w-[340px]">

      <p class="text-center text-black text-[0.8rem] mb-4">
        Créer un compte Admin
      </p>

      <!-- Nom -->
      <div class="mb-3">
        <input type="text" id="name" placeholder="Nom complet"
          class="w-full px-3 py-2 border border-[#ccc] rounded-md text-[0.82rem] text-[#333] outline-none bg-[#f9f9f9] transition-colors duration-200 placeholder:text-[#aaa] focus:border-[rgb(86,108,157)]"/>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <input type="email" id="email" placeholder="E-mail"
          class="w-full px-3 py-2 border border-[#ccc] rounded-md text-[0.82rem] text-[#333] outline-none bg-[#f9f9f9] transition-colors duration-200 placeholder:text-[#aaa] focus:border-[rgb(86,108,157)]"/>
      </div>

      <!-- Mot de passe -->
      <div class="mb-3">
        <input type="password" id="password" placeholder="Mot de passe"
          class="w-full px-3 py-2 border border-[#ccc] rounded-md text-[0.82rem] text-[#333] outline-none bg-[#f9f9f9] transition-colors duration-200 placeholder:text-[#aaa] focus:border-[rgb(86,108,157)]"/>
      </div>

      <!-- Bouton -->
      <button onclick="handleRegister()" id="btnRegister"
        class="w-full py-2 bg-black text-white border-none rounded-md text-[0.82rem] font-medium cursor-pointer transition-opacity duration-200 tracking-[0.03em] hover:opacity-90 mt-1">
        S'inscrire
      </button>

      <!-- Messages -->
      <p id="error-msg" class="text-red-500 text-[0.72rem] text-center mt-1.5 hidden"></p>
      <p id="success-msg" class="text-green-500 text-[0.72rem] text-center mt-1.5 hidden"></p>
    </div>

    <!-- Lien connexion -->
    <div class="mt-3 text-center">
      <p class="text-white text-[0.78rem] m-0">
        Vous avez déjà un compte ?
        <a href="index.html" class="text-[#FFD700] font-semibold no-underline">Se connecter</a>
      </p>
    </div>

  </div>

  <script>
    async function handleRegister() {
      const name       = document.getElementById('name').value.trim()
      const email      = document.getElementById('email').value.trim()
      const password   = document.getElementById('password').value
      const errorMsg   = document.getElementById('error-msg')
      const successMsg = document.getElementById('success-msg')
      const btn        = document.getElementById('btnRegister')

      errorMsg.classList.add('hidden')
      successMsg.classList.add('hidden')

      if (!name || !email || !password) {
        errorMsg.textContent = 'Veuillez remplir tous les champs.'
        errorMsg.classList.remove('hidden')
        return
      }

      if (!email.includes('@')) {
        errorMsg.textContent = 'Adresse e-mail invalide.'
        errorMsg.classList.remove('hidden')
        return
      }

      if (password.length < 6) {
        errorMsg.textContent = 'Le mot de passe doit faire au moins 6 caractères.'
        errorMsg.classList.remove('hidden')
        return
      }

      btn.textContent = 'Inscription...'
      btn.disabled = true

      try {
        const response = await fetch('https://red-product-backend-tzk6.onrender.com/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        })

        const data = await response.json()

        if (response.ok) {
          successMsg.textContent = 'Compte créé ! Redirection...'
          successMsg.classList.remove('hidden')
          setTimeout(() => {
            window.location.href = 'index.html'
          }, 1500)
        } else {
          errorMsg.textContent = data.message || 'Erreur lors de la création.'
          errorMsg.classList.remove('hidden')
        }

      } catch (error) {
        errorMsg.textContent = 'Impossible de contacter le serveur.'
        errorMsg.classList.remove('hidden')
      }

      btn.textContent = "S'inscrire"
      btn.disabled = false
    }

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') handleRegister()
    })
  </script>

</body>
</html>
