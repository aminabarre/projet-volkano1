<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RED PRODUCT – Connexion</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body class="font-['Poppins',sans-serif] relative min-h-screen flex flex-col items-center justify-center m-0">

  <!-- Image de fond avec overlay -->
  <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('images/baground.jpeg');">
    <div class="absolute inset-0 bg-black/75"></div>
  </div>

  <!-- Contenu au-dessus du fond -->
  <div class="relative z-10 flex flex-col items-center w-full px-4">

    <!-- Logo -->
    <div class="mb-5 text-center">
      <span class="text-white text-[1.3rem] font-semibold tracking-[0.05em]">
        <span class="inline-block w-[22px] h-[26px] bg-white mr-2 align-middle [clip-path:polygon(0%_0%,100%_0%,100%_100%,50%_78%,0%_100%)]"></span>
        RED PRODUCT
      </span>
    </div>

    <!-- Carte formulaire -->
    <div class="bg-white rounded-lg px-6 py-7 w-full max-w-[400px]">

      <p class="text-center text-black  text-l  mb-7">
        Connectez-vous en tant que Admin
      </p>

      <div class="mb-3.5">
        <input type="email" id="email" placeholder="E-mail"
          class="w-full px-3 py-2.5 border border-[#ccc] rounded-md text-[0.88rem] text-[#333] mb-7 outline-none bg-[#f9f9f9] transition-colors duration-200 placeholder:text-[#aaa] focus:border-[rgb(86,108,157)]"/>
      </div>

      <div class="mb-3.5">
        <input type="password" id="password" placeholder="Mot de passe"
          class="w-full px-3 py-2.5 border border-[#ccc] rounded-md text-[0.88rem] mb-7 text-[#333] outline-none bg-[#f9f9f9] transition-colors duration-200 placeholder:text-[#aaa] focus:border-[rgb(86,108,157)]"/>
      </div>

      <div class="flex items-center gap-2 mb-[18px]">
        <input type="checkbox" id="remember" class="accent-[rgb(86,108,157)] w-3.5 h-3.5 cursor-pointer"/>
        <label for="remember" class="text-m text-black cursor-pointer">Gardez-moi connecté</label>
      </div>

      <button onclick="handleLogin()"
        class="w-full py-2.5 bg-black text-white border-none rounded-md text-[0.9rem] font-medium cursor-pointer transition-opacity duration-200 tracking-[0.03em] hover:opacity-90">
        <a href="dashboard.html" class="no-underline text-white">
        Se connecter
      </button>

      <p id="error-msg" class="text-red-500 text-[0.78rem] text-center mt-1.5 hidden"></p>
    </div>

    <!-- Liens sous la carte -->
    <div class="mt-4 text-center">
      <a href="forgot-password.html" class="text-[#FFD700] text-sm no-underline block mb-3">Mot de passe oublié?</a>
      <p class="text-white text-sm m-0 mb-3">
        Vous n'avez pas de compte?
        <a href="index.html" class="text-[#FFD700] font-semibold no-underline">S'inscrire</a>
      </p>
    </div>

  </div>

  
</body>
</html>
