<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RED PRODUCT – Nouveau mot de passe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
</head>
<body class="font-['Poppins',sans-serif] relative min-h-screen flex flex-col items-center justify-center m-0">

  <!-- Fond -->
  <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('images/baground.jpeg');">
    <div class="absolute inset-0 bg-black/75"></div>
  </div>

  <!-- Contenu -->
  <div class="relative z-10 flex flex-col items-center w-full px-4">

    <!-- Logo -->
    <div class="mb-4 text-center flex items-center justify-center gap-2">
      <img src="images/Link___SVG.png" alt="Logo" class="w-6 h-6 object-contain"/>
      <span class="text-white text-[1rem] font-semibold tracking-[0.05em]">RED PRODUCT</span>
    </div>

    <!-- Carte -->
    <div class="bg-white rounded-lg px-5 py-6 w-full max-w-[340px]">

      <p class="text-center text-black text-[0.8rem] mb-4 font-medium">
        Créer un nouveau mot de passe
      </p>

      <!-- Nouveau mot de passe -->
      <div class="mb-3">
        <input type="password" id="password" placeholder="Nouveau mot de passe"
          class="w-full px-3 py-2 border border-[#ccc] rounded-md text-[0.82rem] text-[#333] outline-none bg-[#f9f9f9] transition-colors duration-200 placeholder:text-[#aaa] focus:border-[rgb(86,108,157)]"/>
      </div>

      <!-- Confirmer mot de passe -->
      <div class="mb-3">
        <input type="password" id="confirmPassword" placeholder="Confirmer le mot de passe"
          class="w-full px-3 py-2 border border-[#ccc] rounded-md text-[0.82rem] text-[#333] outline-none bg-[#f9f9f9] transition-colors duration-200 placeholder:text-[#aaa] focus:border-[rgb(86,108,157)]"/>
      </div>

      <!-- Bouton -->
      <button onclick="handleReset()" id="btnReset"
        class="w-full py-2 bg-black text-white border-none rounded-md text-[0.82rem] font-medium cursor-pointer transition-opacity duration-200 hover:opacity-90 mt-1">
        Réinitialiser le mot de passe
      </button>

      <!-- Messages -->
      <p id="error-msg" class="text-red-500 text-[0.72rem] text-center mt-1.5 hidden"></p>
      <p id="success-msg" class="text-green-500 text-[0.72rem] text-center mt-1.5 hidden"></p>
    </div>

    <!-- Lien retour -->
    <div class="mt-3 text-center">
      <a href="index.html" class="text-[#FFD700] text-[0.78rem] no-underline">
        Retour à la connexion
      </a>
    </div>

  </div>

  <script>
    // Récupérer le token depuis l'URL
    const urlParams = new URLSearchParams(window.location.search)
    const token = urlParams.get('token')

    if (!token) {
      document.getElementById('error-msg').textContent = 'Lien invalide ou expiré.'
      document.getElementById('error-msg').classList.remove('hidden')
      document.getElementById('btnReset').disabled = true
    }

    async function handleReset() {
      const password        = document.getElementById('password').value
      const confirmPassword = document.getElementById('confirmPassword').value
      const errorMsg        = document.getElementById('error-msg')
      const successMsg      = document.getElementById('success-msg')
      const btn             = document.getElementById('btnReset')

      errorMsg.classList.add('hidden')
      successMsg.classList.add('hidden')

      if (!password || !confirmPassword) {
        errorMsg.textContent = 'Veuillez remplir tous les champs.'
        errorMsg.classList.remove('hidden')
        return
      }

      if (password.length < 6) {
        errorMsg.textContent = 'Le mot de passe doit faire au moins 6 caractères.'
        errorMsg.classList.remove('hidden')
        return
      }

      if (password !== confirmPassword) {
        errorMsg.textContent = 'Les mots de passe ne correspondent pas.'
        errorMsg.classList.remove('hidden')
        return
      }

      btn.textContent = 'Réinitialisation...'
      btn.disabled = true

      try {
        const response = await fetch('https://red-product-backend-tzk6.onrender.com/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        })

        const data = await response.json()

        if (response.ok) {
          successMsg.textContent = 'Mot de passe réinitialisé ! Redirection...'
          successMsg.classList.remove('hidden')
          setTimeout(() => {
            window.location.href = 'index.html'
          }, 2000)
        } else {
          errorMsg.textContent = data.message || 'Erreur lors de la réinitialisation.'
          errorMsg.classList.remove('hidden')
        }

      } catch (error) {
        errorMsg.textContent = 'Impossible de contacter le serveur.'
        errorMsg.classList.remove('hidden')
      }

      btn.textContent = 'Réinitialiser le mot de passe'
      btn.disabled = false
    }
  </script>

</body>
</html>
