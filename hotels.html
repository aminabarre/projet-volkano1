<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RED PRODUCT – Liste des hôtels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <style> * { font-family: 'Poppins', sans-serif; } </style>
</head>
<body class="bg-gray-100 min-h-screen flex">

  <!-- OVERLAY mobile -->
  <div id="overlay" class="fixed inset-0 bg-black/50 z-30 hidden lg:hidden" onclick="toggleSidebar()"></div>

  <!-- SIDEBAR -->
  <aside id="sidebar"
    class="w-[220px] min-h-screen shadow-md flex flex-col fixed top-0 left-0 z-40
           -translate-x-full lg:translate-x-0 transition-transform duration-300"
    style="background-image: url('images/baground.jpeg'); background-size: cover;">
    <div class="absolute inset-0 bg-black/60 z-0"></div>
    <div class="relative z-10 flex flex-col flex-1">

      <div class="flex items-center justify-between px-4 py-4 border-b border-white/20">
        <div class="flex items-center gap-2">
          <span class="inline-block w-[16px] h-[20px] bg-white [clip-path:polygon(0%_0%,100%_0%,100%_100%,50%_78%,0%_100%)]"></span>
          <span class="text-white font-semibold text-[0.85rem] tracking-wide">RED PRODUCT</span>
        </div>
        <button onclick="toggleSidebar()" class="lg:hidden text-white/70 hover:text-white">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="px-3 pt-4 flex-1">
        <p class="text-[0.7rem] text-white/60 tracking-widest mb-2 px-2">Principal</p>
        <nav class="flex flex-col gap-1">
          <a href="dashboard.html" class="flex items-center gap-2 px-3 py-2 rounded-lg text-[0.82rem] text-white/80 hover:bg-white/10 transition-colors">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
            </svg>
            Dashboard
          </a>
          <a href="hotels.html" class="flex items-center gap-2 px-3 py-2 rounded-lg text-m text-gray-800 font-medium bg-white/20 transition-colors">
            <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M3 21h18M3 10h18M3 7l9-4 9 4M4 10v11M20 10v11M8 14v3M12 14v3M16 14v3"/>
            </svg>
            Liste des hôtels
          </a>
        </nav>
      </div>

      <div class="px-3 py-3 border-t border-white/20 flex items-center gap-2">
        <div class="w-7 h-7 rounded-full bg-white/20 flex items-center justify-center text-white text-[0.7rem] font-semibold shrink-0">MB</div>
        <div class="min-w-0">
          <p class="text-[0.75rem] font-medium text-white leading-tight truncate">Mouhammet Badiane</p>
          <p class="text-[0.65rem] text-green-400">● En ligne</p>
        </div>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="w-full flex flex-col min-h-screen lg:ml-[220px] lg:w-[calc(100%-220px)]">

    <!-- HEADER -->
    <header class="bg-white shadow-sm px-3 md:px-5 py-2.5 flex items-center justify-between sticky top-0 z-10 gap-2">
      <div class="flex items-center gap-2 min-w-0">
        <button onclick="toggleSidebar()" class="lg:hidden text-gray-500 hover:text-gray-700 shrink-0">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <h1 class="text-[0.88rem] md:text-[0.95rem] font-semibold text-black truncate">Liste des hôtels</h1>
      </div>
      <div class="flex items-center gap-2 md:gap-3 shrink-0">
        <div class="relative hidden md:block">
          <svg class="w-3.5 h-3.5 text-gray-400 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" placeholder="Rechercher..." class="pl-8 pr-3 py-1.5 text-[0.78rem] border border-gray-200 rounded-lg outline-none bg-gray-50 focus:border-[rgb(86,108,157)] w-36 md:w-44 transition-colors"/>
        </div>
        <div class="relative cursor-pointer">
          <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[0.55rem] w-3.5 h-3.5 rounded-full flex items-center justify-center">3</span>
        </div>
        <div class="w-7 h-7 rounded-full bg-[rgb(86,108,157)] flex items-center justify-center text-white text-[0.7rem] font-semibold cursor-pointer shrink-0">MB</div>
        <a href="index.html" class="shrink-0">
          <svg class="w-4 h-4 text-gray-400 hover:text-red-400 transition-colors" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </a>
      </div>
    </header>

    <!-- CONTENU -->
    <div class="flex-1">

      <!-- Barre Hôtels + bouton -->
      <div class="flex items-center justify-between bg-white border-b border-gray-200 px-4 md:px-5 py-3">
        <div class="flex items-center gap-2">
          <span class="text-[0.9rem] md:text-[1rem] text-gray-600 font-medium">Hôtels</span>
          <span id="hotel-count" class="bg-[rgb(86,108,157)] text-white text-[0.65rem] font-semibold px-2 py-0.5 rounded-full">0</span>
        </div>
        <button onclick="openModal()"
          class="flex items-center gap-1.5 border border-gray-300 text-gray-700 text-[0.75rem] md:text-[0.8rem] font-medium px-3 py-1.5 rounded-lg hover:bg-gray-50 transition-colors">
          <svg class="w-3.5 h-3.5 shrink-0" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          <span class="hidden sm:inline">Créer un nouveau hôtel</span>
          <span class="sm:hidden">Nouveau</span>
        </button>
      </div>

      <!-- Grille hôtels -->
      <div id="hotels-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-3 md:gap-4 p-3 md:p-4">
        <p class="text-gray-400 text-sm col-span-4 text-center py-10">Chargement...</p>
      </div>

    </div>
  </main>

  <!-- MODAL CRÉER UN HÔTEL -->
  <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center p-4" style="background: rgba(0,0,0,0.5);">
    <div class="bg-white rounded-xl w-full max-w-lg max-h-[90vh] overflow-y-auto shadow-2xl">

      <div class="flex items-center gap-3 px-5 py-4 border-b border-gray-100">
        <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
          </svg>
        </button>
        <h2 class="text-[0.85rem] font-semibold text-gray-700 tracking-wide uppercase">Créer un nouveau hôtel</h2>
      </div>

      <div class="px-5 py-4 flex flex-col gap-4">

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div class="flex flex-col gap-1">
            <label class="text-[0.78rem] text-gray-600 font-medium">Nom de l'hôtel</label>
            <input type="text" id="hotelNom" placeholder="Ex: Hôtel Terrou-Bi"
              class="px-3 py-2 border border-gray-200 rounded-lg text-[0.8rem] outline-none focus:border-[rgb(86,108,157)] transition-colors bg-gray-50"/>
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-[0.78rem] text-gray-600 font-medium">Adresse</label>
            <input type="text" id="hotelAdresse" placeholder="Ex: Les Almadies, Dakar"
              class="px-3 py-2 border border-gray-200 rounded-lg text-[0.8rem] outline-none focus:border-[rgb(86,108,157)] transition-colors bg-gray-50"/>
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div class="flex flex-col gap-1">
            <label class="text-[0.78rem] text-gray-600 font-medium">E-mail</label>
            <input type="email" id="hotelEmail" placeholder="contact@hotel.com"
              class="px-3 py-2 border border-gray-200 rounded-lg text-[0.8rem] outline-none focus:border-[rgb(86,108,157)] transition-colors bg-gray-50"/>
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-[0.78rem] text-gray-600 font-medium">Numéro de téléphone</label>
            <input type="tel" id="hotelTel" placeholder="+221 77 000 00 00"
              class="px-3 py-2 border border-gray-200 rounded-lg text-[0.8rem] outline-none focus:border-[rgb(86,108,157)] transition-colors bg-gray-50"/>
          </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <div class="flex flex-col gap-1">
            <label class="text-[0.78rem] text-gray-600 font-medium">Prix par nuit</label>
            <input type="number" id="hotelPrix" placeholder="Ex: 55000"
              class="px-3 py-2 border border-gray-200 rounded-lg text-[0.8rem] outline-none focus:border-[rgb(86,108,157)] transition-colors bg-gray-50"/>
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-[0.78rem] text-gray-600 font-medium">Devise</label>
            <select id="hotelDevise"
              class="px-3 py-2 border border-gray-200 rounded-lg text-[0.8rem] outline-none focus:border-[rgb(86,108,157)] transition-colors bg-gray-50 cursor-pointer">
              <option value="XOF">F XOF</option>
              <option value="EUR">€ EUR</option>
              <option value="USD">$ USD</option>
            </select>
          </div>
        </div>

        <div class="flex flex-col gap-1">
          <label class="text-[0.78rem] text-gray-600 font-medium">Ajouter une photo</label>
          <div id="dropzone"
            class="border-2 border-dashed border-gray-200 rounded-xl h-32 flex flex-col items-center justify-center cursor-pointer hover:border-[rgb(86,108,157)] transition-colors bg-gray-50"
            onclick="document.getElementById('photoInput').click()">
            <svg class="w-8 h-8 text-gray-300 mb-1" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
              <polyline points="21 15 16 10 5 21"/>
            </svg>
            <p class="text-[0.75rem] text-gray-400">Cliquer pour ajouter une photo</p>
            <input type="file" id="photoInput" accept="image/*" class="hidden" onchange="previewPhoto(event)"/>
          </div>
          <img id="photoPreview" src="" alt="" class="hidden w-full h-32 object-cover rounded-xl mt-2"/>
        </div>

        <p id="modalError" class="text-red-500 text-[0.75rem] text-center hidden"></p>

        <div class="flex justify-end pt-1">
          <button onclick="enregistrerHotel()" id="btnEnregistrer"
            class="bg-[rgb(86,108,157)] hover:opacity-90 text-white font-medium text-[0.82rem] px-6 py-2.5 rounded-lg transition-opacity">
            Enregistrer
          </button>
        </div>

      </div>
    </div>
  </div>

  <script>
    const API = 'https://red-product-backend-tzk6.onrender.com/api/hotels'

    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('-translate-x-full')
      document.getElementById('overlay').classList.toggle('hidden')
    }

    function openModal() {
      const modal = document.getElementById('modal')
      modal.classList.remove('hidden')
      modal.classList.add('flex')
      document.body.style.overflow = 'hidden'
    }

    function closeModal() {
      const modal = document.getElementById('modal')
      modal.classList.add('hidden')
      modal.classList.remove('flex')
      document.body.style.overflow = ''
      document.getElementById('hotelNom').value = ''
      document.getElementById('hotelAdresse').value = ''
      document.getElementById('hotelEmail').value = ''
      document.getElementById('hotelTel').value = ''
      document.getElementById('hotelPrix').value = ''
      document.getElementById('photoPreview').classList.add('hidden')
      document.getElementById('dropzone').classList.remove('hidden')
      document.getElementById('modalError').classList.add('hidden')
    }

    document.getElementById('modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal()
    })

    function previewPhoto(event) {
      const file = event.target.files[0]
      if (!file) return
      const preview = document.getElementById('photoPreview')
      preview.src = URL.createObjectURL(file)
      preview.classList.remove('hidden')
      document.getElementById('dropzone').classList.add('hidden')
    }

    async function loadHotels() {
      try {
        const response = await fetch(API)
        const hotels = await response.json()
        const grid = document.getElementById('hotels-grid')
        const count = document.getElementById('hotel-count')

        count.textContent = hotels.length

        if (hotels.length === 0) {
          grid.innerHTML = '<p class="text-gray-400 text-sm col-span-4 text-center py-10">Aucun hôtel trouvé.</p>'
          return
        }

        grid.innerHTML = hotels.map(hotel => `
          <div class="bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-shadow cursor-pointer">
            <div class="h-[160px] md:h-[180px] overflow-hidden">
              <img src="${hotel.photo || 'images/image1.jpeg'}"
                   alt="${hotel.nom}"
                   class="w-full h-full object-cover hover:scale-105 transition-transform duration-300"
                   onerror="this.src='images/image1.jpeg'"/>
            </div>
            <div class="p-3">
              <p class="text-[0.8rem] font-semibold text-gray-700 truncate mb-1">${hotel.nom}</p>
              <p class="text-[0.7rem] text-gray-400 mb-1.5">${hotel.adresse}</p>
              <p class="text-[0.75rem] font-medium text-[rgb(86,108,157)]">
                ${hotel.prix.toLocaleString()} ${hotel.devise}
                <span class="text-gray-400 font-normal">/ nuit</span>
              </p>
            </div>
          </div>
        `).join('')

      } catch (error) {
        console.log('Erreur chargement :', error)
      }
    }

    async function enregistrerHotel() {
      const nom    = document.getElementById('hotelNom').value.trim()
      const adresse = document.getElementById('hotelAdresse').value.trim()
      const email  = document.getElementById('hotelEmail').value.trim()
      const tel    = document.getElementById('hotelTel').value.trim()
      const prix   = document.getElementById('hotelPrix').value.trim()
      const devise = document.getElementById('hotelDevise').value
      const photo  = document.getElementById('photoInput').files[0]
      const erreur = document.getElementById('modalError')
      const btn    = document.getElementById('btnEnregistrer')

      erreur.classList.add('hidden')

      if (!nom || !adresse || !email || !tel || !prix) {
        erreur.textContent = 'Veuillez remplir tous les champs.'
        erreur.classList.remove('hidden')
        return
      }

      btn.textContent = 'Enregistrement...'
      btn.disabled = true

      try {
        const formData = new FormData()
        formData.append('nom', nom)
        formData.append('adresse', adresse)
        formData.append('email', email)
        formData.append('telephone', tel)
        formData.append('prix', prix)
        formData.append('devise', devise)
        if (photo) formData.append('photo', photo)

      const response = await fetch(API, {
    method: 'POST',
    headers: {
        'Authorization': `Bearer ${localStorage.getItem('token')}`
    },
    body: formData
})

        const data = await response.json()

        if (response.ok) {
          closeModal()
          loadHotels()
        } else {
          erreur.textContent = data.message || 'Erreur lors de la création.'
          erreur.classList.remove('hidden')
        }

      } catch (error) {
        erreur.textContent = 'Erreur de connexion au serveur.'
        erreur.classList.remove('hidden')
      }

      btn.textContent = 'Enregistrer'
      btn.disabled = false
    }

    loadHotels()
  </script>

</body>
</html>
